<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accounting Flash Cards</title>
  <script>
    window.MathJax = {
      tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
      svg: { fontCache: 'global' }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: #888;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    .progress {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }

    .progress-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #2a2a3e;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .progress-dot.active {
      background: #667eea;
      box-shadow: 0 0 8px rgba(102, 126, 234, 0.5);
    }

    .card-container {
      perspective: 1000px;
      width: 100%;
      max-width: 580px;
      height: 320px;
      cursor: pointer;
    }

    .card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .card.flipped {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2.5rem;
      text-align: center;
    }

    .card-front {
      background: linear-gradient(145deg, #1a1a2e, #16213e);
      border: 1px solid #2a2a4a;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .card-front h2 {
      font-size: 1.6rem;
      font-weight: 600;
      color: #f0f0f0;
      line-height: 1.4;
    }

    .card-front .tap-hint {
      position: absolute;
      bottom: 1.2rem;
      color: #555;
      font-size: 0.8rem;
    }

    .card-back {
      background: linear-gradient(145deg, #1e1e3a, #1a2440);
      border: 1px solid #3a3a5a;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      transform: rotateY(180deg);
    }

    .card-back .formula {
      font-size: 1.4rem;
      color: #f8f8f8;
    }

    .card-back .formula-label {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .card-back .note {
      font-size: 0.85rem;
      color: #999;
      margin-top: 1rem;
      font-style: italic;
    }

    .nav {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
      align-items: center;
    }

    .nav button {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      color: #ccc;
      padding: 0.7rem 1.5rem;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .nav button:hover {
      background: #2a2a4a;
      color: #fff;
      border-color: #667eea;
    }

    .nav button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .counter {
      color: #888;
      font-size: 0.95rem;
      font-variant-numeric: tabular-nums;
      min-width: 4rem;
      text-align: center;
    }

    .keyboard-hint {
      margin-top: 2rem;
      color: #444;
      font-size: 0.8rem;
    }

    kbd {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 4px;
      padding: 0.15rem 0.4rem;
      font-family: inherit;
      font-size: 0.75rem;
    }
  </style>
</head>
<body>
  <h1>Accounting Flash Cards</h1>
  <p class="subtitle">Click card to flip &middot; Arrow keys to navigate</p>

  <div class="progress" id="progress"></div>

  <div class="card-container" id="cardContainer" onclick="flipCard()">
    <div class="card" id="card">
      <div class="card-face card-front">
        <h2 id="frontText"></h2>
        <span class="tap-hint">tap to reveal</span>
      </div>
      <div class="card-face card-back">
        <div class="formula-label" id="backLabel"></div>
        <div class="formula" id="backFormula"></div>
        <div class="note" id="backNote"></div>
      </div>
    </div>
  </div>

  <div class="nav">
    <button id="prevBtn" onclick="navigate(-1)">&larr; Prev</button>
    <span class="counter" id="counter"></span>
    <button id="nextBtn" onclick="navigate(1)">Next &rarr;</button>
  </div>

  <p class="keyboard-hint">
    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate &nbsp;&middot;&nbsp; <kbd>Space</kbd> flip
  </p>

  <script>
    const cards = [
      {
        front: "Gross Profit Margin",
        label: "Gross Profit Margin",
        formula: "$$\\text{Gross Profit Margin} = \\frac{\\text{Gross Profit}}{\\text{Net Sales}} \\times 100$$"
      },
      {
        front: "Gross Profit Markup",
        label: "Gross Profit Markup",
        formula: "$$\\text{Gross Profit Markup} = \\frac{\\text{Gross Profit}}{\\text{Cost of Goods Sold}} \\times 100$$"
      },
      {
        front: "Extended Accounting Equation",
        label: "Extended Accounting Equation",
        formula: "$$\\text{Assets} + \\text{Expenses} = \\text{Equity} + \\text{Revenue} + \\text{Liabilities}$$"
      },
      {
        front: "Quick Ratio",
        label: "Quick Ratio",
        formula: "$$\\text{Quick Ratio} = \\frac{\\text{Current Assets} - \\text{Inventories} - \\text{Accruals}}{\\text{Current Liabilities}} \\times 100$$"
      },
      {
        front: "Current Ratio",
        label: "Current Ratio",
        formula: "$$\\text{Current Ratio} = \\frac{\\text{Current Assets}}{\\text{Current Liabilities}} \\times 100$$"
      },
      {
        front: "Gross Margin Markup",
        label: "Gross Margin Markup",
        formula: "$$\\text{Gross Margin Markup} = \\frac{\\text{Sales} - \\text{Material Expenses}}{\\text{Material Expenses}} \\times 100$$"
      },
      {
        front: "Equity Ratio",
        label: "Equity Ratio",
        formula: "$$\\text{Equity Ratio} = \\frac{\\text{Equity}}{\\text{Total Assets}} \\times 100$$"
      },
      {
        front: "Equity & Long-term Debt to Non-current Assets Ratio",
        label: "Equity & LT Debt to Non-current Assets",
        formula: "$$\\text{Ratio} = \\frac{\\text{Equity} + \\text{Non-current Liabilities}}{\\text{Non-current Assets}} \\times 100$$"
      },
      {
        front: "Return on Equity",
        label: "Return on Equity (ROE)",
        formula: "$$\\text{ROE} = \\frac{\\text{Profit of the Year}}{\\text{Average Equity}} \\times 100$$"
      },
      {
        front: "Return on Assets",
        label: "Return on Assets (ROA)",
        formula: "$$\\text{ROA} = \\frac{\\text{Profit of the Year} + \\text{Financial Expenses}}{\\text{Average Total Assets}} \\times 100$$"
      },
      {
        front: "Gross Profit",
        label: "Profit Waterfall",
        formula: "$$\\text{Gross Profit} = \\text{Revenue (Sales)} - \\text{COGS}$$",
        note: "How profitable is the core product?"
      },
      {
        front: "EBITDA",
        label: "Profit Waterfall",
        formula: "$$\\text{EBITDA} = \\text{Gross Profit} - \\text{Operating Expenses}$$",
        note: "How profitable are operations, ignoring financing and accounting choices?"
      },
      {
        front: "EBIT (Operating Profit)",
        label: "Profit Waterfall",
        formula: "$$\\text{EBIT} = \\text{EBITDA} - \\text{Depreciation \\& Amortisation}$$",
        note: "How profitable after asset wear and tear?"
      },
      {
        front: "EBT",
        label: "Profit Waterfall",
        formula: "$$\\text{EBT} = \\text{EBIT} - \\text{Interest Expense} \\;(+ \\text{Interest Income})$$",
        note: "How profitable after paying lenders?"
      },
      {
        front: "Net Profit",
        label: "Profit Waterfall",
        formula: "$$\\text{Net Profit} = \\text{EBT} - \\text{Tax}$$",
        note: "How much actually belongs to owners? (Bottom line)"
      },
      {
        front: "Accrued Interest",
        label: "Accrued Interest",
        formula: "$$\\text{Interest} = \\text{Nominal} \\times \\text{Rate\\%} \\times \\frac{\\text{Days}}{360}$$",
        note: "Always use 360 days"
      },
      {
        front: "Anticipatory Tax (Swiss)",
        label: "Anticipatory Tax (Verrechnungssteuer)",
        formula: "$$65\\% \\rightarrow \\text{Bank} \\qquad 35\\% \\rightarrow \\text{Receivables, anticipatory tax}$$",
        note: "Applied to: bond interest, bank interest, dividends"
      },
      {
        front: "Dividends",
        label: "Dividends",
        formula: "$$\\text{Gross Dividend} = \\text{Nominal Value} \\times \\text{Dividend \\%}$$",
        note: "Never use market value"
      },
      {
        front: "Balance Sheet Change Types",
        label: "Balance Sheet Change Types",
        formula: "$$\\begin{aligned} &\\textbf{Asset swap:} && \\text{one asset} \\uparrow \\;\\text{one asset} \\downarrow \\\\ &\\textbf{Liability swap:} && \\text{one liability} \\uparrow \\;\\text{one liability} \\downarrow \\\\ &\\textbf{Capital procurement:} && \\text{asset} \\uparrow \\;\\text{AND liability} \\uparrow \\\\ &\\textbf{Capital repayment:} && \\text{asset} \\downarrow \\;\\text{AND liability} \\downarrow \\end{aligned}$$"
      },
      {
        front: "Golden Rule of Finance",
        label: "Golden Rule of Finance",
        formula: "$$\\text{Non-current Assets} \\leq \\text{Equity} + \\text{Long-term Debt}$$",
        note: "Long-term assets must be financed with long-term capital"
      }
    ];

    let current = 0;

    function render() {
      const c = cards[current];
      document.getElementById('frontText').textContent = c.front;
      document.getElementById('backLabel').textContent = c.label;
      document.getElementById('backFormula').innerHTML = c.formula;
      document.getElementById('backNote').textContent = c.note || '';
      document.getElementById('counter').textContent = `${current + 1} / ${cards.length}`;
      document.getElementById('prevBtn').disabled = current === 0;
      document.getElementById('nextBtn').disabled = current === cards.length - 1;
      document.getElementById('card').classList.remove('flipped');

      // Update progress dots
      document.querySelectorAll('.progress-dot').forEach((dot, i) => {
        dot.classList.toggle('active', i === current);
      });

      // Re-render MathJax
      if (window.MathJax && window.MathJax.typesetPromise) {
        MathJax.typesetPromise();
      }
    }

    function flipCard() {
      document.getElementById('card').classList.toggle('flipped');
    }

    function navigate(dir) {
      const next = current + dir;
      if (next >= 0 && next < cards.length) {
        current = next;
        render();
      }
    }

    // Build progress dots
    const progressEl = document.getElementById('progress');
    cards.forEach((_, i) => {
      const dot = document.createElement('div');
      dot.className = 'progress-dot';
      dot.onclick = (e) => { e.stopPropagation(); current = i; render(); };
      progressEl.appendChild(dot);
    });

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') navigate(-1);
      else if (e.key === 'ArrowRight') navigate(1);
      else if (e.key === ' ') { e.preventDefault(); flipCard(); }
    });

    render();
  </script>
</body>
</html>
